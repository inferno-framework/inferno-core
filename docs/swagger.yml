swagger: "2.0"
info:
  description: "Inferno JSON API"
  version: "0.1.1"
  title: "Inferno JSON API"
  contact:
    email: "inferno@groups.mitre.org"
  license:
    name: "Apache 2.0"
    url: "http://www.apache.org/licenses/LICENSE-2.0.html"
host: "localhost"
basePath: "/api"
tags:
- name: "Test Suite"
  description: "A collection of tests"
- name: "Test Session"
  description: "An individual testing session"
- name: "Test Run"
  description: "An individual test run"
- name: "Result"
  description: "The outcome of an individual test, group, or suite"
- name: "Session Data"
  description: "Input and output values stored in a test session"
- name: "Request"
  description: "Details of HTTP Requests"
- name: "Requirement"
  description: "A testable requirement"
- name: "Version"
  description: "Inferno version"
schemes:
- "http"
- "https"
paths:
  /test_suites:
    get:
      tags:
      - "Test Suite"
      summary: "List all test suites"
      description: ""
      produces:
      - "application/json"
      responses:
        "200":
          description: "success"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/TestSuiteSummary"
  /test_suites/{test_suite_id}:
    get:
      tags:
      - "Test Suite"
      summary: "Get a single test suite"
      description: ""
      produces:
      - "application/json"
      parameters:
      - in: "path"
        type: "string"
        name: "test_suite_id"
        description: "ID of the test suite"
        required: true
      responses:
        "200":
          description: "Success"
          schema:
            $ref: "#/definitions/TestSuite"
        "404":
          description: "Test suite not found"
  /test_suites/{test_suite_id}/requirements:
    get:
      tags:
      - "Requirement"
      summary: "Get the requirements for a test suite for a given session."
      produces:
      - "application/json"
      parameters:
      - in: "path"
        type: "string"
        name: "test_suite_id"
        description: "ID of the test suite"
        required: true
      - in: "query"
        type: "string"
        name: "session_id"
        description: "ID of the test session"
        required: false
      responses:
        "200":
          description: "success"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/Requirement"
        "404":
          description: "Test suite or Session not found"
  /test_suites/{test_suite_id}/check_configuration:
    put:
      tags:
      - "Test Suite"
      summary: "Check the configuration for a test suite"
      description: ""
      produces:
      - "application/json"
      parameters:
      - in: "path"
        type: "string"
        name: "test_suite_id"
        description: "ID of the test suite"
        required: true
      responses:
        "200":
          description: "Success"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/Message"
        "404":
          description: "Test suite not found"
  /test_sessions:
    post:
      tags:
      - "Test Session"
      summary: "Start a new test session"
      description: "Parameters may be passed as query parameters or as a JSON request body."
      produces:
      - "application/json"
      consumes:
      - "application/json"
      parameters:
      - in: "query"
        type: "string"
        name: "test_suite_id"
        description: "ID of the test suite being run in this test session"
        required: false
      - in: "query"
        type: "string"
        name: "preset_id"
        description: "ID of a preset to use with this test session"
        required: false
      - in: "body"
        name: "body"
        description: "Session parameters as a JSON body (alternative to query parameters)"
        required: false
        schema:
          type: "object"
          properties:
            test_suite_id:
              type: "string"
              description: "ID of the test suite being run in this test session"
            preset_id:
              type: "string"
              description: "ID of a preset to use with this test session"
            suite_options:
              type: "array"
              description: "Suite option selections for this session"
              items:
                type: "object"
                properties:
                  id:
                    type: "string"
                  value:
                    type: "string"
      responses:
        "200":
          description: "Success"
          schema:
            $ref: "#/definitions/TestSession"
        "422":
          description: "Invalid parameters"
  /test_sessions/{test_session_id}:
    get:
      tags:
      - "Test Session"
      summary: "Get an existing test session"
      description: ""
      produces:
      - "application/json"
      parameters:
      - in: "path"
        type: "string"
        name: "test_session_id"
        description: "ID of the test session"
        required: true
      responses:
        "200":
          description: "Success"
          schema:
            $ref: "#/definitions/TestSession"
        "404":
          description: "Test session not found"
  /test_sessions/{test_session_id}/results:
    get:
      tags:
      - "Result"
      summary: "Get the results for a test session"
      description: "Get the most recent set of results for each test/group/suite in the session. Use the `all` query parameter to retrieve all results."
      produces:
      - "application/json"
      parameters:
      - in: "path"
        type: "string"
        name: "test_session_id"
        description: "ID of the test session"
        required: true
      - in: "query"
        type: "boolean"
        name: "all"
        description: "Whether to retrieve all results rather than only the most recent"
        required: false
      responses:
        "200":
          description: "Success"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/Result"
        "404":
          description: "Test session not found"
  /test_sessions/{test_session_id}/session_data:
    get:
      tags:
      - "Session Data"
      summary: "Get the session data for a test session"
      description: "Get the most recent set of session data in a session. This represents the values from test inputs and outputs."
      produces:
      - "application/json"
      parameters:
      - in: "path"
        type: "string"
        name: "test_session_id"
        description: "ID of the test session"
        required: true
      responses:
        "200":
          description: "Success"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/SessionData"
        "404":
          description: "Test session not found"
  /test_sessions/{test_session_id}/session_data/apply_preset:
    put:
      tags:
      - "Session Data"
      summary: "Apply preset inputs to a test session"
      description: "Use a set of predefined inputs in a test session."
      parameters:
      - in: "path"
        type: "string"
        name: "test_session_id"
        description: "ID of the test session"
        required: true
      - in: "query"
        type: "string"
        name: "preset_id"
        description: "ID of the preset"
        required: true
      responses:
        "200":
          description: "Success"
        "404":
          description: "Test session or preset not found"
  /test_runs:
    post:
      tags:
      - "Test Run"
      summary: "Execute a suite, group, or test"
      description: ""
      produces:
      - "application/json"
      consumes:
      - "application/json"
      parameters:
      - in: "body"
        name: "body"
        description: "Test suite, group, or test and inputs to execute."
        required: true
        schema:
          type: "object"
          required:
          - "test_session_id"
          properties:
            test_session_id:
              type: "string"
            test_suite_id:
              type: "string"
            test_group_id:
              type: "string"
            test_id:
              type: "string"
            inputs:
              type: "array"
              items:
                $ref: "#/definitions/Input"
      responses:
        "200":
          description: "Success"
          schema:
            $ref: "#/definitions/TestRun"
        "409":
          description: "Another test run is already in progress for this session"
        "422":
          description: "Invalid test_group_id, test_suite_id, test_id, or inputs"
  /test_runs/{test_run_id}:
    get:
      tags:
      - "Test Run"
      summary: "Get an existing test run"
      description: ""
      produces:
      - "application/json"
      parameters:
      - in: "path"
        type: "string"
        name: "test_run_id"
        description: "ID of the test run"
        required: true
      - in: "query"
        type: "boolean"
        name: "include_results"
        description: "Whether to include the test run's results"
        required: false
      - in: "query"
        type: "string"
        name: "after"
        description: "Only include results from at or after an ISO8601 date time"
        format: "date-time"
        required: false
      responses:
        "200":
          description: "Success"
          schema:
            $ref: "#/definitions/TestRun"
        "404":
          description: "Test run not found"
    delete:
      tags:
      - "Test Run"
      summary: "Cancel an existing test run"
      description: "Cancels the test run if it is in progress or waiting. Returns 204 with no body in all non-error cases, including when the run does not exist or has already finished."
      parameters:
      - in: "path"
        type: "string"
        name: "test_run_id"
        description: "ID of the test run"
        required: true
      responses:
        "204":
          description: "Success"
        "500":
          description: "Unexpected error"
  /test_sessions/{test_session_id}/last_test_run:
    get:
      tags:
      - "Test Run"
      summary: "Get the most recent test run"
      description: ""
      produces:
      - "application/json"
      parameters:
      - in: "path"
        type: "string"
        name: "test_session_id"
        description: "ID of the test session"
        required: true
      responses:
        "200":
          description: "Success, or null if no test run exists for this session"
          schema:
            $ref: "#/definitions/TestRun"
  /test_sessions/{test_session_id}/results/{result_id}/io/{type}/{name}:
    get:
      tags:
      - "Result"
      summary: "Get the value of a specific input or output for a result"
      description: "Returns the raw value of the named input or output from a result. The response Content-Type will be application/json, application/xml, or text/plain depending on the value."
      produces:
      - "application/json"
      - "application/xml"
      - "text/plain"
      parameters:
      - in: "path"
        type: "string"
        name: "test_session_id"
        description: "ID of the test session"
        required: true
      - in: "path"
        type: "string"
        name: "result_id"
        description: "ID of the result"
        required: true
      - in: "path"
        type: "string"
        name: "type"
        description: "Whether to retrieve an input or output value"
        required: true
        enum: ["inputs", "outputs"]
      - in: "path"
        type: "string"
        name: "name"
        description: "Name of the input or output"
        required: true
      responses:
        "200":
          description: "Success"
        "400":
          description: "Invalid type parameter"
        "404":
          description: "Test session, result, or named value not found"
  /test_runs/{test_run_id}/results:
    get:
      tags:
      - "Result"
      summary: "Get the results for a test run"
      description: ""
      produces:
      - "application/json"
      parameters:
      - in: "path"
        type: "string"
        name: "test_run_id"
        description: "ID of the test run"
        required: true
      responses:
        "200":
          description: "Success"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/Result"
        "404":
          description: "Test run not found"
  /requests/{request_id}:
    get:
      tags:
      - "Request"
      summary:
        "Get the details of a request (and response)"
      produces:
      - "application/json"
      parameters:
      - in: "path"
        type: "string"
        name: "request_id"
        description: "ID of the request"
        required: true
      responses:
        "200":
          description: "Success"
          schema:
            $ref: "#/definitions/Request"
        "404":
          description: "Request not found"
  /requirements/{requirement_id}:
    get:
      tags:
      - "Requirement"
      summary: "Get a single Requirement"
      produces:
      - "application/json"
      parameters:
      - in: "path"
        type: "string"
        name: "requirement_id"
        description: "ID of the requirement"
        required: true
      responses:
        "200":
          description: "Success"
          schema:
            $ref: "#/definitions/Requirement"
        "404":
          description: "Requirement not found"
  /version:
    get:
      tags:
      - "Version"
      summary: "Get the version of Inferno currently being queried."
      produces:
      - "application/json"
      responses:
        "200":
          description: "success"
          schema:
            $ref: "#/definitions/Version"

definitions:
  TestSession:
    type: "object"
    required:
    - "test_suite_id"
    properties:
      id:
        type: "string"
        readOnly: true
      test_suite_id:
        type: "string"
      test_suite:
        $ref: "#/definitions/TestSuite"
      suite_options:
        type: "array"
        items:
          $ref: "#/definitions/SuiteOption"
  TestRun:
    type: "object"
    required:
    - "test_session_id"
    properties:
      id:
        type: "string"
        readOnly: true
      test_session_id:
        type: "string"
      status:
        type: "string"
        readOnly: true
      test_count:
        type: "number"
        readOnly: true
      test_suite_id:
        type: "string"
      test_group_id:
        type: "string"
      test_id:
        type: "string"
      results:
        type: "array"
        readOnly: true
        description: "Only populated on GET /test_runs/:id when include_results=true"
        items:
          $ref: "#/definitions/Result"
  Result:
    type: "object"
    required:
    - "id"
    properties:
      id:
        type: "string"
      test_suite_id:
        type: "string"
      test_group_id:
        type: "string"
      test_id:
        type: "string"
      result:
        type: "string"
        enum: [pass, fail, skip, omit, error, running, wait, cancel]
      test_run_id:
        type: "string"
      test_session_id:
        type: "string"
      result_message:
        type: "string"
      created_at:
        type: "string"
        format: "date-time"
      updated_at:
        type: "string"
        format: "date-time"
      messages:
        type: "array"
        items:
          $ref: "#/definitions/Message"
      requests:
        type: "array"
        items:
          $ref: "#/definitions/RequestSummary"
      inputs:
        type: "array"
        items:
          $ref: "#/definitions/SessionData"
      outputs:
        type: "array"
        items:
          $ref: "#/definitions/SessionData"
      optional:
        type: "boolean"
  RequestSummary:
    type: "object"
    required:
    - "id"
    - "index"
    - "timestamp"
    - "verb"
    - "url"
    - "direction"
    - "result_id"
    properties:
      id:
        type: "string"
      index:
        type: "integer"
      timestamp:
        type: "string"
      verb:
        type: "string"
      url:
        type: "string"
      direction:
        type: "string"
        enum: ["in", "out"]
      status:
        type: "integer"
      result_id:
        type: "string"
  Request:
    type: "object"
    required:
    - "id"
    - "index"
    - "timestamp"
    - "verb"
    - "url"
    - "direction"
    - "result_id"
    properties:
      id:
        type: "string"
      index:
        type: "integer"
      timestamp:
        type: "string"
      verb:
        type: "string"
      url:
        type: "string"
      direction:
        type: "string"
        enum: ["in", "out"]
      status:
        type: "integer"
      result_id:
        type: "string"
      request_headers:
        type: "array"
        items:
          type: "object"
          properties:
            name:
              type: "string"
            value:
              type: "string"
      response_headers:
        type: "array"
        items:
          type: "object"
          properties:
            name:
              type: "string"
            value:
              type: "string"
      request_body:
        type: "string"
      response_body:
        type: "string"
  Message:
    type: "object"
    required:
    - "type"
    - "message"
    properties:
      type:
        type: "string"
        enum: [error, warning, info]
      message:
        type: "string"
  PresetSummary:
    type: "object"
    required:
    - "id"
    - "title"
    properties:
      id:
        type: "string"
      title:
        type: "string"
  TestSuiteSummary:
    type: "object"
    required:
    - "id"
    properties:
      id:
        type: "string"
      title:
        type: "string"
      short_title:
        type: "string"
      description:
        type: "string"
      short_description:
        type: "string"
      input_instructions:
        type: "string"
      links:
        type: "array"
        items:
          type: "object"
          properties:
            type:
              type: "string"
            label:
              type: "string"
            url:
              type: "string"
      test_count:
        type: "number"
        readOnly: true
      version:
        type: "string"
      presets:
        type: "array"
        items:
          $ref: "#/definitions/PresetSummary"
      suite_options:
        type: "array"
        items:
          $ref: "#/definitions/SuiteOption"
      suite_summary:
        type: "string"
  TestSuite:
    allOf:
    - $ref: "#/definitions/TestSuiteSummary"
    - type: "object"
      properties:
        test_groups:
          type: "array"
          items:
            $ref: "#/definitions/TestGroup"
        inputs:
          type: "array"
          items:
            $ref: "#/definitions/Input"
        configuration_messages:
          type: "array"
          items:
            $ref: "#/definitions/Message"
        requirement_sets:
          type: "array"
          readOnly: true
          items:
            $ref: "#/definitions/RequirementSet"
        verifies_requirements:
          type: "array"
          readOnly: true
          items:
            type: "string"
  RequirementSet:
    type: "object"
    required:
    - "identifier"
    properties:
      identifier:
        type: "string"
      title:
        type: "string"
  SuiteOption:
    type: "object"
    properties:
      id:
        type: "string"
        readOnly: true
      title:
        type: "string"
        readOnly: true
      default:
        type: "string"
        readOnly: true
      description:
        type: "string"
        readOnly: true
      value:
        type: "string"
      list_options:
        type: "array"
        readOnly: true
        items:
          type: "object"
          properties:
            label:
              type: "string"
            value:
              type: "string"
  TestGroup:
    type: "object"
    required:
    - "id"
    properties:
      id:
        type: "string"
      short_id:
        type: "string"
      title:
        type: "string"
      short_title:
        type: "string"
      description:
        type: "string"
      short_description:
        type: "string"
      input_instructions:
        type: "string"
      run_as_group:
        type: "boolean"
      test_groups:
        type: "array"
        items:
          $ref: "#/definitions/TestGroup"
      tests:
        type: "array"
        items:
          $ref: "#/definitions/Test"
      inputs:
        type: "array"
        items:
          $ref: "#/definitions/Input"
      outputs:
        type: "array"
        readOnly: true
        items:
          type: "object"
      test_count:
        type: "number"
        readOnly: true
      user_runnable:
        type: "boolean"
        readOnly: true
      optional:
        type: "boolean"
        readOnly: true
      verifies_requirements:
        type: "array"
        readOnly: true
        items:
          type: "string"
  Test:
    type: "object"
    required:
    - "id"
    properties:
      id:
        type: "string"
      short_id:
        type: "string"
      title:
        type: "string"
      short_title:
        type: "string"
      description:
        type: "string"
      short_description:
        type: "string"
      input_instructions:
        type: "string"
      inputs:
        type: "array"
        items:
          $ref: "#/definitions/Input"
      outputs:
        type: "array"
        readOnly: true
        items:
          type: "object"
      user_runnable:
        type: "boolean"
        readOnly: true
      optional:
        type: "boolean"
        readOnly: true
      verifies_requirements:
        type: "array"
        readOnly: true
        items:
          type: "string"
  Input:
    type: "object"
    required:
    - "name"
    properties:
      name:
        type: "string"
      value:
        type: "string"
      title:
        type: "string"
        readOnly: true
      description:
        type: "string"
        readOnly: true
      optional:
        type: "boolean"
        readOnly: true
      type:
        type: "string"
        readOnly: true
      locked:
        type: "boolean"
        readOnly: true
      hidden:
        type: "boolean"
        readOnly: true
      default:
        type: "string"
        readOnly: true
      options:
        type: "object"
        readOnly: true
        properties:
          list_options:
            type: "array"
            items:
              type: "object"
              properties:
                label:
                  type: "string"
                value:
                  type: "string"
          components:
            type: "array"
            items:
              type: "object"
  SessionData:
    type: "object"
    required:
    - "name"
    properties:
      name:
        type: "string"
      value:
        type: "string"
  Version:
    type: "object"
    required:
    - "version"
    properties:
      version:
        type: "string"
  Requirement:
    type: "object"
    required:
    - "id"
    - "requirement"
    - "conformance"
    - "actors"
    properties:
      id:
        type: "string"
      requirement:
        type: "string"
      conformance:
        type: "string"
      actors:
        type: "array"
        items:
          type: "string"
      conditionality:
        type: "string"
      url:
        type: "string"
      subrequirements:
        type: "array"
        items:
          type: "string"
      not_tested_reason:
        type: "string"
      not_tested_details:
        type: "string"
