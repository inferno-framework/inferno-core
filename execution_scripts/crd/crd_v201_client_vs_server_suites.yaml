    start_run:
      session: client
      runnable: 1.3
    action_description: Run Client Group 1.3 Card Must Support

  - state_description: Finished Client Group 1.3 Card Must Support
    session: client
    status: done
    last_completed: 1.3
    start_run:
      session: server
      runnable: 3.7
    next_poll_session: server
    action_description: Run Server Group 3.7 Required Card Response Validation

  - state_description: Finished Server Group 3.7 Required Card Response Validation
    session: server
    status: done
    last_completed: 3.7
    action: END_SCRIPT
    action_description: Script Completed
