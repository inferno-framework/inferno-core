sessions:
  - suite: crd_client
    name: client
    preset: inferno-crd-server-suite
    suite_options:
      smart_app_launch_version: smart_app_launch_2
  - suite: crd_server
    name: server
    preset: inferno-crd-client-suite

# normalized_strings:
  # - replacement: <UUID>
  # pattern: /[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i

steps:
  - state_description: client session created
    session: client
    status: created
    start_run:
      session: client
      runnable: 1.1
    action_description: Run Client Group 1.1 Client Registration

  - state_description: Wait at Client test 1.1.02 (attestation)
    session: client
    status: waiting
    last_completed: 1.1.02
    command: "curl -o /dev/null -s '{wait_outputs.attest_true_url}'"
    action_description: GET the attestation URL

  - state_description: Finished Client Group 1.1 Client Registration
    session: client
    status: done
    last_completed: 1.1
    start_run:
      session: client
      runnable: 1.2.1
    action_description: Run Client Group 1.2.1 Hooks > appointment-book

  - state_description: Wait at Client test 1.2.1.01 Requests received for appointment-book hook
    session: client
    status: waiting
    last_completed: 1.2.1.01
    start_run:
      session: server
      runnable: 1
    next_poll_session: server
    action_description: Run Server Group 1 Discovery

  - state_description: Finished Server Group 1 Discovery
    session: server
    status: done
    last_completed: 1
    start_run:
      session: server
      runnable: 2
    action_description: Run Server Group 2 Demonstrate a Hook Response

  - state_description: Finished Server Group 2 Demonstrate a Hook Response
    session: server
    status: done
    last_completed: 2
    start_run:
      session: server
      runnable: 3.1
    action_description: Run Server Group 3.1 Hook Tests > appointment-book

  - state_description: Finished Server Group 3.1 Hook Tests > appointment-book
    session: server
    status: done
    last_completed: 3.1
    command: "curl -o /dev/null -s '{client.wait_outputs.continuation_url}'"
    next_poll_session: client
    action_description: Indicate that appointment-book invocations are complete

  - state_description: Wait at Client test 1.2.1.13 Check that returned decision support details are displayed to the user
    session: client
    status: waiting
    last_completed: 1.2.1.13
    command: "curl -o /dev/null -s '{wait_outputs.attest_true_url}'"
    action_description: Attest that the cards have been displayed

  - state_description: Finished Client Group 1.2.1 Hooks > appointment-book
    session: client
    status: done
    last_completed: 1.2.1
    start_run:
      session: client
      runnable: 1.2.2
    action_description: Run Client Group 1.2.2 Hooks > encounter-start

  - state_description: Wait at Client test 1.2.2.01 Requests received for encounter-start hook
    session: client
    status: waiting
    last_completed: 1.2.2.01
    start_run:
      session: server
      runnable: 3.2
    next_poll_session: server
    action_description: Run Server Group 3.2 Hook Tests > encounter-start

  - state_description: Finished Server Group 3.2 Hook Tests > encounter-start
    session: server
    status: done
    last_completed: 3.2
    command: "curl -o /dev/null -s '{client.wait_outputs.continuation_url}'"
    next_poll_session: client
    action_description: Indicate that encounter-start invocations are complete

  - state_description: Wait at Client test 1.2.2.13 Check that returned decision support details are displayed to the user
    session: client
    status: waiting
    last_completed: 1.2.2.13
    command: "curl -o /dev/null -s '{wait_outputs.attest_true_url}'"
    action_description: Attest that the cards have been displayed

  - state_description: Finished Client Group 1.2.2 Hooks > encounter-start
    session: client
    status: done
    last_completed: 1.2.2
    start_run:
      session: client
      runnable: 1.2.3
    action_description: Run Client Group 1.2.3 Hooks > encounter-discharge

